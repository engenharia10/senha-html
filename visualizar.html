<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Alfatronic - Pagina de Links</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg: #2C3E50;
      --panel: #34495E;
      --primary: #3498DB;
      --success: #27AE60;
      --text: #ECF0F1;
      --text-muted: #BDC3C7;
    }

    html,
    body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;
    }

    .page {
      min-height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 18px;
    }

    .card {
      width: min(680px, 100%);
      background: var(--panel);
      border-radius: 16px;
      padding: 20px;
    }

    .title {
      font-size: 24px;
      font-weight: 700;
      text-align: center;
      margin-bottom: 12px;
    }

    .subtitle {
      text-align: center;
      color: var(--text-muted);
      margin-bottom: 18px;
      font-size: 14px;
    }

    .section {
      background: rgba(0, 0, 0, 0.18);
      border-radius: 12px;
      padding: 14px;
      margin-bottom: 12px;
    }

    .section-title {
      font-size: 12px;
      letter-spacing: 0.8px;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 10px;
      font-weight: 700;
    }

    .link-box {
      background: #ffffff;
      color: #2C3E50;
      border-radius: 10px;
      padding: 12px;
      word-break: break-all;
      font-size: 14px;
    }

    .btn-row {
      display: flex;
      gap: 10px;
      margin-top: 10px;
      flex-wrap: wrap;
    }

    .btn {
      border: none;
      border-radius: 10px;
      padding: 12px 14px;
      font-weight: 700;
      cursor: pointer;
      color: #ffffff;
      background: var(--primary);
      flex: 1;
      min-width: 140px;
    }

    .btn-secondary {
      background: var(--success);
    }

    .back-link {
      display: block;
      text-align: center;
      color: var(--text-muted);
      text-decoration: none;
      margin-top: 8px;
      font-size: 12px;
    }

    .back-link:hover {
      color: var(--text);
    }
  </style>
</head>

<body>
  <div class="page">
    <div class="card">
      <div class="title">Pagina de Links</div>
      <div class="subtitle">Visualizar o app e criar link rapido</div>

      <div class="section">
        <div class="section-title">Visualizar</div>
        <div class="link-box" id="link-app">index.html</div>
        <div class="btn-row">
          <button class="btn" id="btn-abrir">Abrir app</button>
          <button class="btn btn-secondary" id="btn-copiar">Copiar link</button>
        </div>
      </div>

      <div class="section">
        <div class="section-title">Criar link</div>
        <div class="link-box" id="link-gerado">index.html</div>
        <div class="btn-row">
          <button class="btn" id="btn-atualizar">Atualizar link</button>
          <button class="btn btn-secondary" id="btn-copiar-2">Copiar link</button>
        </div>
      </div>

      <div class="section">
        <div class="section-title">GitHub Pages (ver online)</div>
        <div class="link-box" id="link-github">https://engenharia10.github.io/senha-html/</div>
        <div class="btn-row">
          <button class="btn" id="btn-abrir-gh">Abrir página</button>
          <button class="btn btn-secondary" id="btn-copiar-gh">Copiar link</button>
        </div>
      </div>

      <a class="back-link" href="./index.html">Voltar para o app</a>
    </div>
  </div>

  <script>
    function getBaseUrl() {
      return location.href.replace(/[^/]*$/, '');
    }

    function buildAppUrl() {
      return getBaseUrl() + 'index.html';
    }

    function setLinks() {
      const url = buildAppUrl();
      document.getElementById('link-app').textContent = url;
      document.getElementById('link-gerado').textContent = url;
    }

    async function copyText(text) {
      try {
        await navigator.clipboard.writeText(text);
      } catch {
        const ta = document.createElement('textarea');
        ta.value = text;
        Object.assign(ta.style, { position: 'fixed', opacity: '0', top: '0', left: '0' });
        document.body.appendChild(ta);
        ta.focus(); ta.select();
        try { document.execCommand('copy'); } catch { }
        document.body.removeChild(ta);
      }
    }

    setLinks();

    document.getElementById('btn-abrir').addEventListener('click', () => {
      window.location.href = buildAppUrl();
    });

    document.getElementById('btn-copiar').addEventListener('click', () => {
      copyText(buildAppUrl());
    });

    document.getElementById('btn-atualizar').addEventListener('click', () => {
      setLinks();
    });

    document.getElementById('btn-copiar-2').addEventListener('click', () => {
      copyText(buildAppUrl());
    });

    const ghUrl = 'https://engenharia10.github.io/senha-html/';

    document.getElementById('btn-abrir-gh').addEventListener('click', () => {
      window.open(ghUrl, '_blank');
    });

    document.getElementById('btn-copiar-gh').addEventListener('click', () => {
      copyText(ghUrl);
    });
  </script>
</body>

</html>
